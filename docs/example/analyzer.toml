[analyzer]
name = "oxisentinel"
bind_addr = "127.0.0.1:8080"

[condition]
enabled = true
condition_dir = "conditions"

[[condition.rules]]
name = "oxibelt-admin-denied"
priority = 100
when = "Log.Source == 'oxibelt' && Log.Message.contains('denied')"

[judgment]
enabled = true
mode = "monitor"

[[judgment.handlers]]
name = "emit-admin-denied-intent"
condition = "oxibelt-admin-denied"

[[judgment.handlers.actions]]
type = "emit_callback_intent"
target = "oxibelt_waf"
operation = "review"
dedupe_key = "oxibelt-admin-denied"
